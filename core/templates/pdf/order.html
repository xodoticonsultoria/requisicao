<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body {
    font-family: Arial;
    font-size: 11px;
    margin: 20px;
}

.header {
    text-align: center;
    margin-bottom: 15px;
}

.title {
    font-size: 18px;
    font-weight: bold;
}

.info {
    margin-bottom: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10px;
}

th, td {
    border: 1px solid #000;
    padding: 4px;
}

th {
    background: #eee;
}

/* 🔥 IMPRESSÃO AUTOMÁTICA */
@media print {
    body {
        margin: 10px;
    }
}
</style>

<script>
window.onload = function() {
    window.print();
}
</script>

</head>

<body>

<div class="header">
    <div class="title">XODÓ - PEDIDO #{{ order.id }}</div>
</div>

<div class="info">
    <strong>Usuário:</strong> {{ order.user }}<br>
    <strong>Data:</strong> {{ order.created_at }}<br>
    <strong>Status:</strong> {{ order.status }}
</div>

<table>
    <thead>
        <tr>
            <th>Produto</th>
            <th>Quantidade</th>
        </tr>
    </thead>

    <tbody>
        {% for item in order.orderitem_set.all %}
        <tr>
            <td>{{ item.product.name }}</td>
            <td>{{ item.quantity }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
